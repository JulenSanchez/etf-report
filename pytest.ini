[pytest]
testpaths = tests
pythonpath = scripts src
# -p no:capture needed on Windows + Python 3.13 due to pytest capture bug
# when modules produce stdout during import (quant_tuner init, etc.)
# CI (Ubuntu) doesn't need this — the workflow override below is fine.
addopts = -v --tb=short -p no:capture -p no:logging
markers =
    slow: tests that need network or large data (deselect with '-m "not slow"')
    network: tests that require internet access
    tuner: tests that require a running Tuner process
