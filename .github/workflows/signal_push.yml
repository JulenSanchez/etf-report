name: 收盘前信号推送（远端兜底）

on:
  schedule:
    # 14:45 CST = 06:45 UTC, Mon-Fri (~6min full fetch on cache miss, push before 14:55)
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual push, print to log)'
        type: boolean
        default: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore quant data cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/quant
          key: quant-data-${{ github.run_date }}
          restore-keys: quant-data-
          enableCrossOsArchive: true

      - name: Run signal push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          FLAGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            FLAGS="--dry-run"
          fi
          python scripts/preclose_push.py $FLAGS

      - name: Save quant data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/quant
          key: quant-data-${{ github.run_date }}-${{ github.run_attempt }}
          enableCrossOsArchive: true
