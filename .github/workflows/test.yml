name: test

# Auto-run on push to main for code/test/config changes.
# Also available for manual trigger.
on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests -v --tb=short \
            --cov=scripts --cov=src \
            --cov-report=term-missing \
            --cov-report=html \
            --timeout=120
