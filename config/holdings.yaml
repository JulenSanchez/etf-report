#    - hk: 香港交易所（港股）
#
# 3. 数据维护：
#    - 本文件应定期更新以反映实际持仓变化
#    - 建议每月或每季度检查一次权重数据
#    - 如发现成分股调整，请及时更新本配置
#
# 4. 使用建议：
#    - 系统启动时从本文件加载成分股配置
#    - 配置变更无需修改Python代码
#    - 支持动态加载，便于快速迭代
