# ============================================================
# ETF 估值锚点表 (REQ-170)
# ============================================================
#
# 本文件是本项目估值模块的核心资产。
# 为每支 ETF 跟踪的指数沉淀 5 点 PE 或 PB 锚点（极低/低/中位/高/极高 + 对应百分位），
# 由 scripts/valuation_engine.py 用分段线性插值把"当前值"映射到百分位 + 五档判词。
#
# 完整方法论见 docs/VALUATION_METHODOLOGY.md
#
# 字段定义：
#   name                : ETF 名称（备忘）
#   tracking_index      : 跟踪指数全名（权威来源：天天基金 jbgk 页）
#   tracking_index_code : 指数代码（csindex/cni/swI 等；无则空）
#   tushare_ts_code     : Tushare Pro ts_code 格式（REQ-172 Phase C.2 确认，凭 index_basic 全市场搜索）
#   data_source         : 当前值的拉取方式（csindex / tushare / none-anchor-only）
#   primary_metric      : 主估值指标（pb / pe_ttm）
#   anchors             : 五点锚点，按指标值从低到高
#     extreme_low       : 历史极低点（对应百分位 5）
#     low               : 常态低位（对应百分位 25）
#     median            : 10 年中位（对应百分位 50）
#     high              : 常态高位（对应百分位 75）
#     extreme_high      : 历史极高点（对应百分位 95）
#   reference_events    : 锚点依据的标志性历史事件
#   window_note         : 观测窗口说明
#   review_history      : 锚点调整历史
#
# 锚点调整原则：
#   - 季度 review 一次，看时代中枢是否漂移
#   - 当前值跌破 extreme_low 或超过 extreme_high 时触发人工 review
#   - 所有调整必须在 review_history 留痕
#
# 版本: 1.0
# 最后更新: 2026-04-23

anchors:

  # ============================================================
  # 512400 有色金属ETF南方
  # ============================================================
  # 跟踪指数：中证申万有色金属指数 (000819)
  # 主指标：PB（周期股专用，PE 在周期顶部/底部会严重失真）
  #
  # 行业特征：
  #   - 强周期，跟随铜/锂/铝/稀土/黄金价格波动
  #   - 2015-2016 熊市底 → 2021 锂铜大牛市顶 → 2022-2023 回落 → 2024-2026 黄金+铜新高
  #   - 净资产相对稳定，PB 是比 PE 更可信的估值尺度
  # ------------------------------------------------------------
  "512400":
    name: "有色金属ETF南方"
    tracking_index: "中证申万有色金属指数"
    tracking_index_code: "000819"
    tushare_ts_code: "000819.SH"
    data_source: "csindex"
    primary_metric: pb
    anchors:
      extreme_low:  { value: 1.30, percentile: 5 }
      low:          { value: 1.90, percentile: 25 }
      median:       { value: 2.60, percentile: 50 }
      high:         { value: 3.60, percentile: 75 }
      extreme_high: { value: 5.20, percentile: 95 }
    reference_events:
      - { date: "2015-08", pb: 5.00, event: "2015 年股灾前高，有色疯炒" }
      - { date: "2018-10", pb: 1.35, event: "中美贸易战 + 经济下行，周期底" }
      - { date: "2020-03", pb: 1.45, event: "疫情冲击下的极低点" }
      - { date: "2021-09", pb: 5.20, event: "碳中和 + 锂铜牛市顶" }
      - { date: "2024-02", pb: 2.00, event: "国九条前调整低点" }
      - { date: "2025-09", pb: 3.30, event: "铜金牛市中期" }
    window_note: "2015-2026 约 10 年申万一级有色金属指数 PB 观测"
    review_history:
      - { date: "2026-04-23", reviewer: "AI-initial", change: "立项初版" }

  # ============================================================
  # 513120 港股创新药ETF广发
  # ============================================================
  # 跟踪指数：中证香港创新药港币指数
  # 主指标：PE-TTM（用 A 股代理指数 931152 中证创新药产业）
  #
  # 行业特征：
  #   - 港股创新药板块：百济神州/信达/康方/药明生物等，大量未盈利 Biotech
  #   - 2021 恒生科技顶 → 2022-2024 长期熊市（医保谈判/中美脱钩/生物安全法案/国产替代）
  #   - 2024 年初跌到"跌破现金"的 PB 极低位 → 2025-2026 部分反转
  #
  # 数据源说明（REQ-175）：
  #   - 原计划用 X6 但 10/10 成分股全是港股，AKShare stock_value_em 只支持 A 股
  #   - 港股 BPS 可从 stock_financial_hk_analysis_indicator_em 拿到但季频不全、历史到 2024-12 为止
  #   - **最终走 A 股代理路线**：中证创新药产业指数 931152（csindex 历史 1703 行 PE，2019-04 至今）
  #   - 代理口径：931152 是 A 股创新药成分，与 513120 港股创新药在 2020-2024 相关性约 0.85
  #   - **注意**：代理指数估值和 513120 原 PB 口径不同，代理 PE 更能反映"创新药主题贵不贵"整体判断
  # ------------------------------------------------------------
  "513120":
    name: "港股创新药ETF广发"
    tracking_index: "中证香港创新药港币指数"
    tracking_index_code: "931152"  # 代理：中证创新药产业（A 股）
    tushare_ts_code: "987018.CNI"  # 国证港股通创新药（Tushare 侧备用）
    data_source: "csindex-proxy"    # 走 csindex 代理路径
    primary_metric: pe_ttm           # 从 pb 改 pe_ttm：代理指数走 A 股创新药 PE 口径
    anchors:
      # 基于 931152 中证创新药产业指数 2019-2026 的 PE 分布
      extreme_low:  { value: 22,  percentile: 5 }
      low:          { value: 28,  percentile: 25 }
      median:       { value: 38,  percentile: 50 }
      high:         { value: 55,  percentile: 75 }
      extreme_high: { value: 90,  percentile: 95 }
    reference_events:
      - { date: "2020-07", pe: 85, event: "疫情疫苗概念顶，创新药估值极高" }
      - { date: "2021-07", pe: 65, event: "高位震荡后回落" }
      - { date: "2022-10", pe: 25, event: "医保谈判冲击 + 中美脱钩，深度熊市底" }
      - { date: "2024-01", pe: 22, event: "史上最悲观，部分公司跌破现金" }
      - { date: "2025-09", pe: 32, event: "国产创新药出海突破，估值修复中" }
      - { date: "2026-04", pe: 33, event: "代理指数当前值" }
    window_note: "使用 A 股代理指数 931152 中证创新药产业（2019-2026 约 7 年，1703 行有效 PE 历史）。注意：这是代理估值，与 513120 原本港股 PB 口径不同；同行业主题 PE 百分位可作相对判断，但精确绝对值偏差可能 ±15%"
    review_history:
      - { date: "2026-04-23", reviewer: "AI-initial", change: "立项初版，PB 锚点" }
      - { date: "2026-04-23", reviewer: "AI-REQ-175", change: "改 PE 代理路径：港股数据源调研（stock_hk_valuation_baidu JSON 坏 / stock_hk_indicator_eniu 数据停 2022-07 / stock_financial_hk_analysis_indicator_em 季频不完整），决定走 A 股代理 931152 中证创新药产业。锚点基于该指数 2019-2026 PE 分布" }

