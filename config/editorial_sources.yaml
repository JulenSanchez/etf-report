# ============================================================
# 宏观卡源
# ============================================================
# 2026-04 实测：新浪 feed.mix 大多数 lid 已失效，实际存活并有数据的只有
#   lid=2517 环球市场 / 2518 A股综述 / 2669 金融要闻 / 2515 IT要闻
# 其中 2517/2518/2669 共用同一后端数据池（前三条完全相同），所以三张宏观卡
# 都从 lid=2517 抓同一流，靠 require_keywords 过滤出各卡主题。
# 说明：单一数据池下 domestic-policy-card 的 A 股政策新闻可能条数较少，
# 这是新浪合并频道导致的源端限制，不是 fetcher 问题。
macro_cards:
  domestic-policy-card:
    title: "🇨🇳 国内政策与事件"
    sources:
      - type: "sina_roll_json"
        lid: 2517
        name: "环球市场（国内政策切片）"
        keep_top: 40
      # 华尔街见闻 A 股频道（政策解读较多）
      - type: "wscn_lives"
        channel: "a-stock-channel"
        name: "华尔街见闻A股"
        keep_top: 30
    require_keywords: ["央行", "LPR", "MLF", "利率", "货币政策", "财政", "国务院", "发改委", "统计局",
                       "证监会", "网信办", "中国人民银行", "政策", "监管", "国常会", "政治局", "两会", "十四五", "十五五",
                       "改革", "减税", "降准", "降息", "A股", "外资"]
    exclude_keywords: ["车展", "娱乐"]
    keep_n: 4

  global-news-card:
    title: "🌐 国际重大新闻"
    sources:
      - type: "sina_roll_json"
        lid: 2517
        name: "环球市场"
        keep_top: 40
      # 华尔街见闻全球频道（这正是它的强项）
      - type: "wscn_lives"
        channel: "global-channel"
        name: "华尔街见闻全球"
        keep_top: 30
    require_keywords: ["美联储", "降息", "加息", "美国", "欧洲", "欧盟", "日本", "英国",
                       "地缘", "油价", "黄金", "美股", "纳指", "标普", "道指",
                       "俄乌", "中东", "伊朗", "以色列", "特朗普", "拜登", "关税", "贸易战", "OPEC"]
    exclude_keywords: ["车展", "娱乐"]
    keep_n: 4

  market-sentiment-card:
    title: "📊 市场情绪分析"
    sources:
      - type: "sina_roll_json"
        lid: 2517
        name: "环球市场（A股情绪切片）"
        keep_top: 40
      - type: "wscn_lives"
        channel: "a-stock-channel"
        name: "华尔街见闻A股情绪"
        keep_top: 30
    require_keywords: ["上证", "沪深", "A股", "北向", "融资", "成交", "盘面", "板块", "主题",
                       "港股通", "南向", "指数", "ETF", "基金", "调仓", "AI", "算力", "科技",
                       "周期", "高股息", "红利", "新能源"]
    exclude_keywords: ["车展", "娱乐"]
    keep_n: 4
