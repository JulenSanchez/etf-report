# ETF 报告系统 — Editorial 内容源配置
# ============================================================
# REQ-158 Step C：本文件驱动 scripts/editorial_fetcher.py 按主题抓新闻/研报。
#
# 两条通路：
#   1. 个股新闻（per-ETF）：按 ETF 的 top_stocks 白名单抓新浪 vCB_AllNewsStock 页
#      A 股用 sh/sz 前缀，港股用 hk 前缀（同一 endpoint）
#   2. 宏观卡源：新浪 feed.mix 滚动 lid 分类（lid=2517 行业研究等）
#
# 关键词过滤：
#   require 命中任一 = 通过；exclude 命中任一 = 丢弃
#   都是在抓回原文之后、合规过滤之前做的"主题相关度"过滤
#
# top_stocks 挑选原则：
#   每只 ETF 取 2-3 只权重前列且行业代表性强的成分股
#   港股 ETF（513120）的港股代码用 hk 前缀

fetcher:
  # 每只个股抓取 top_n 条（新浪页实际是 40 条列表，我们只取 top_n 做关键词过滤）
  per_stock_top_n: 40
  # 关键词过滤后每 ETF 最终保留条数
  # 注意：index.html 模板的 research-date-{code}-N 只支持 N=1..4，超过 4 条会触发
  # verify_html_integrity 的"解释层日期缺失"FAIL。务必保持 <= 4。
  per_etf_kept_n: 4
  # 宏观卡同理，index.html 的 editorial-date-{card}-N 也是 1..4
  per_macro_kept_n: 4
  # 东财关键词搜索每 keyword 保留条数
  em_search_limit: 15
  # 每 ETF 单次请求之间的间隔（秒），避免过频
  inter_request_delay: 0.3
  # HTTP 超时
  request_timeout: 10
  # User-Agent / Referer（单独维护）
  http_headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
    Referer: "https://finance.sina.com.cn/"

etfs:
  "512400":
    name: "有色金属ETF"
    top_stocks:
      - symbol: "sh601899"
        stock_name: "紫金矿业"
      - symbol: "sh603993"
        stock_name: "洛阳钼业"
      - symbol: "sh600547"
        stock_name: "山东黄金"
    # 标题必须含至少一个 require 词才留，否则丢弃
    require_keywords: ["有色", "铜", "金", "锂", "铝", "钴", "稀土", "矿业", "紫金", "洛阳钼业", "山东黄金", "金属"]
    # 命中任一即丢弃（纯噪音）
    exclude_keywords: ["车展", "房地产", "彩票", "娱乐"]

  "513120":
    name: "港股创新药ETF"
    # 换更活跃的港股标的（2026-04 实测新浪/富途新闻活跃度 + BD 相关）：
    # hk01177 中国生物制药（BD 与默沙东合作）、hk01093 石药（研发兑现）、hk03692 翰森（研报覆盖）
    # 保留 hk06160 百济神州做业绩锚点
    top_stocks:
      - symbol: "hk01177"
        stock_name: "中国生物制药"
      - symbol: "hk01093"
        stock_name: "石药集团"
      - symbol: "hk03692"
        stock_name: "翰森制药"
      - symbol: "hk06160"
        stock_name: "百济神州"
    # 富途港股补充源：覆盖新浪缺失的跨平台消息
    futu_hk_stocks:
      - code: "01177"
        stock_name: "中国生物制药"
      - code: "01093"
        stock_name: "石药集团"
      - code: "06160"
        stock_name: "百济神州"
    # 东财关键词文章搜索：覆盖 BD 交易/跨国药企等宏观主题
    em_keywords:
      - "创新药"
      - "创新药BD"
      - "中国创新药"
      - "港股医药"
    # 关键词扩展：BD 主题 + 跨国药企（MNC）
    require_keywords:
      # 行业核心
      - "创新药"
      - "生物医药"
