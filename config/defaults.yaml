# 非搜索参数的唯一默认值来源
# tuner_params_to_config_override 从此文件读取默认值
# YAML preset 可覆盖这些值

scoring:
  sensitivity:
    f1: 8.0
    f3: 1.0
    f7_t: 7.0
    f7_k: 3.0

confidence:
  type: ma_trend
  dead_zone: 17
  full_zone: 65
  ma_bull_pos: 1.0
  ma_bear_pos: 0.3
  ma_trend_period: 26
  ma_direction_confirm: true
  benchmarks:
    - "000300"

position:
  max_holdings: 6
  discretize_step: 0.05
  concentration: 2.0
  c_sensitivity: 0.0
  rebalance_freq: daily
  execution_timing: same_close
  band: 0.0
  band_sensitivity: 0.0
  dynamic_band:
    fast_span: 4
    slow_span: 12
    floor: 0.015
    ceiling: 0.045
  commission_rate: 0.00026

factors:
  f1_active_days: 1
  ema:
    period_weeks: 20
  volume_ratio:
    window_days: 20
  log_return_deviation:
    window_days: 20
    lookback_days: 250
    min_days: 60
    sigma_floor: 0.01

account:
  max_gross_exposure: 2.0
