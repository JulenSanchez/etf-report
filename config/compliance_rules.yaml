# ETF 报告系统 — 公开内容合规过滤规则
# ============================================================
# REQ-158 Step B：本文件驱动 scripts/compliance_filter.py 对
# editorial_fetcher.py 抓回的摘要做底线过滤。
#
# 设计哲学（来自用户 REQ-158 决策）：
#   1. 公开渠道信息一般风险不高，本层是"多一份保险"而非主防线
#   2. 宁愿放过可疑，不愿误杀正常内容（偏宽 > 偏严）
#   3. 所有 block 动作都要写审计日志，方便事后评估是否需要放松
#
# 三档动作：
#   block  — 丢弃（不进 editorial_content.yaml），写入 compliance_audit
#   flag   — 保留但加 [弱相关] 前缀并降权，供后续规则调整观察
#   pass   — 原样保留
#
# 规则来源参考：
#   - 《网络信息内容生态治理规定》（国家网信办 2020）列举的违法和不良信息
#   - 《证券法》《证券期货投资者适当性管理办法》（证监会）关于推介话术的禁止性规定
#   - 《关于加强对利用"荐股软件"从事证券投资咨询业务监管的暂行规定》

# ============================================================
# 1. 敏感关键词（block）— 涉政 / 涉暴 / 违禁
# ============================================================
# 命中任一即 block。按类别维护便于审计，category 会写入命中日志。
sensitive_keywords:
  # 国家统一与地缘政治红线
  - category: "国家统一"
    keywords: ["台独", "港独", "藏独", "疆独", "分裂国家", "分离主义",
               "颠覆国家", "颠覆政权", "推翻政权", "武装叛乱"]

  # 涉政
  - category: "涉政敏感"
    keywords: ["六四", "法轮功", "达赖", "民族矛盾", "煽动民族仇恨",
               "反华势力", "境外敌对势力", "政变"]

  # 涉暴恐
  - category: "暴恐"
    keywords: ["恐怖袭击", "恐怖组织", "制造爆炸", "ISIS",
               "东突", "暴力恐怖"]

  # 色情/赌博/毒品（资讯页面极少见，但保险起见兜底）
  - category: "色情赌博毒品"
    keywords: ["色情", "卖淫", "嫖娼", "淫秽",
               "赌博网站", "澳门赌场推广",
               "毒品交易", "制贩毒"]

# ============================================================
# 2. 投资合规红线（block）— 违规推介话术
# ============================================================
# 证监会明令禁止的话术样式。用正则精准匹配，避免误杀正常业绩描述。
# 注意：这些词本身可能出现在合规的业绩表述中（如"业绩稳赚"某季度），
# 所以用"短语级"正则而非"单词级"。
investment_red_lines:
  - pattern: '保证\s*(?:收益|回报|盈利|赚钱)'
    description: "保证收益类话术"
  - pattern: '稳赚\s*不赔'
    description: "稳赚不赔"
  - pattern: '零\s*风险\s*(?:投资|理财|收益)'
    description: "零风险投资"
  - pattern: '(?:明日|明天|下周)\s*(?:必|一定)\s*涨停'
    description: "涨停预言"
  - pattern: '(?:内部|独家)\s*消息\s*(?:买|入|持)'
    description: "内部消息荐股"
  - pattern: '(?:包|包你|保你|必定)\s*(?:赚|盈利|翻倍)'
    description: "包赚话术"
  - pattern: '代客\s*理财'
    description: "代客理财（非持牌）"
  - pattern: '(?:非法|违法)\s*集资'
    description: "非法集资"
  - pattern: '资金盘'
    description: "资金盘"
  - pattern: '庄家\s*(?:操纵|内幕|拉升)'
    description: "庄家操纵"
  - pattern: '(?:跟|抄)\s*内部\s*(?:单|仓)'
    description: "跟内部单"
  # "强烈推荐" 单独不拦（卖方研报标准用语），配合买卖评级才是违规
  # 此处不加规则

# ============================================================
# 3. 噪音 / 弱相关模式（flag，不 block）
# ============================================================
# 这些特征表明内容虽合规，但与 ETF 投资决策弱相关，加 [弱相关] 前缀降权
# 不会 block。可随时调整。
noise_patterns:
  # 纯广告营销
  - pattern: '(?:开户|注册)\s*(?:送|赠|领取)\s*(?:\d+元|好礼|福利)'
    description: "开户送钱类营销"
  - pattern: '扫码\s*(?:关注|加群|进群)'
    description: "扫码引流"
  - pattern: '(?:报名|抢购|限时)\s*.{0,20}(?:仅剩|最后)'
    description: "限时促销话术"
  # 明显无关的新闻标题特征（新浪个股页有时混入）
  - pattern: '车展.*?首发'
    description: "车展类（除非 ETF 本身是汽车主题）"
  - pattern: '娱乐圈|明星.{0,5}(?:结婚|离婚|官宣)'
    description: "娱乐八卦"
  - pattern: '彩票|双色球|强力球'
    description: "彩票类"

# ============================================================
# 4. 运行时参数
# ============================================================
runtime:
  # 拦截率告警阈值：单次批量过滤中 block 比例超过此值 → 日志 WARN
  # 偏宽设计下日常应 < 1%，超过 10% 说明规则过严或源数据异常
  block_rate_warn_threshold: 0.10

  # 审计日志保留天数
  audit_retention_days: 90

  # 日度摘要输出路径模板（{date} 自动替换）
  daily_summary_path: "logs/compliance_daily_summary_{date}.md"
  audit_log_path: "logs/compliance_audit_{date}.jsonl"
