# ETF 报告系统配置文件 (REQ-107)
# 
# 说明：本文件是完整的配置模板
# 为便于管理，成分股数据已单独分离到 holdings.yaml
# 
# 版本: 1.0
# 最后更新: 2026-04-07

# ============================================================
# 1. ETF列表与基准指数配置
# ============================================================
etfs:
  - code: "512400"
    name: "有色金属ETF"
    market: "sh"
    benchmark:
      code: "sh000300"
      name: "沪深300"
  
  - code: "513120"
    name: "港股创新药ETF"
    market: "sh"
    benchmark:
      code: "sh000300"
      name: "沪深300"
  
  - code: "512070"
    name: "证券保险ETF"
    market: "sh"
    benchmark:
      code: "sh000300"
      name: "沪深300"
  
  - code: "515880"
    name: "通信设备ETF"
    market: "sh"
    benchmark:
      code: "sh000300"
      name: "沪深300"
  
  - code: "159566"
    name: "储能电池ETF"
    market: "sz"
    benchmark:
      code: "sh000300"
      name: "沪深300"
  
  - code: "159698"
    name: "粮食产业ETF"
    market: "sz"
    benchmark:
      code: "sh000300"
      name: "沪深300"

# ============================================================
# 2. K线数据参数
# ============================================================
kline:
  daily:
    # 日线图表显示的天数
    display_days: 60
    # MA均线计算需要的预热数据天数（20日均线需要19天预热）
    warmup_days: 19
    # 实际从API获取的天数（不应手动修改）
    fetch_days: 79
  
  weekly:
    # 周线图表显示的周数
    display_weeks: 52
    # MA均线预热周数
    warmup_weeks: 19
    # 实际获取的周数
    fetch_weeks: 71
  
  # K线尺度参数（新浪财经API）
  scales:
    daily: 240    # 日线
    weekly: 1200  # 周线

# ============================================================
# 3. API 配置 - 新浪财经
# ============================================================
api:
  sina:
    # K线数据接口
    kline_endpoint: "https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData"
    
    # 实时行情接口
    realtime_endpoint: "https://hq.sinajs.cn/list="
    
    # 网络参数
    timeout: 10              # 请求超时时间（秒）
    encoding: "gbk"          # 返回数据编码
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    referer: "https://finance.sina.com.cn/"
    
    # 请求间隔（避免频率过高）
    request_delays:
      kline_fetch: 0.2      # 每次K线请求间隔（秒）
      realtime_fetch: 0.3   # 实时行情请求间隔（秒）

# ============================================================
# 4. 数据文件配置
# ============================================================
files:
  # 目录配置（相对于skill根目录）
  data_dir: "data"
  outputs_dir: "outputs"              # 数据输出目录
  outputs_js_dir: "outputs/js"
  outputs_css_dir: "outputs/css"
  logs_dir: "logs"
  
  # 数据文件
  data_files:
    kline: "etf_full_kline_data.json"         # K线数据
    realtime: "etf_realtime_data.json"        # 实时行情数据
    fund_flow: "fund_flow_data.json"          # 基金流向数据
  
  # 输出文件（index.html 在技能根目录，便于 GitHub 展示）
  html_file: "index.html"             # 根目录的主报告文件
  js_main: "main.js"

# ============================================================
# 5. HTML 更新配置
# ============================================================
html_update:
  # 数据定位标记（用于字符串查找和替换）
  locators:
    report_date_label: "报告日期:"
    data_cutoff_label: "数据截止:"
    generation_time_label: "生成时间:"
    kline_const: "const klineData = "
    realtime_const: "const realtimeData = "
  
  # 日期格式正则表达式
  date_patterns:
    report_date: '\d{4}年\d{2}月\d{2}日'  # 2026年03月17日
    iso_date: '\d{4}-\d{2}-\d{2}'         # 2026-03-17
  
  # 日期格式模板
  date_formats:
    report_date_cn: "%Y年%m月%d日"  # 中文日期格式
    iso_date: "%Y-%m-%d"            # ISO日期格式
  
  # 涨跌幅颜色配置
  colors:
    positive_change: "#10b981"  # 绿色（上涨）
    negative_change: "#ef4444"  # 红色（下跌）
    neutral_change: "#9ca3af"   # 灰色（平盘或无数据）

# ============================================================
# 6. 成分股持仓数据
# ============================================================
# 注意：成分股持仓数据非常庞大，已单独抽取到 holdings.yaml
# 本文件仅做占位符，实际使用时从 holdings.yaml 加载
holdings_file: "holdings.yaml"

# ============================================================
# 7. 系统检查配置
# ============================================================
system_check:
  # 必需的Python脚本
  required_scripts:
    - "update_report.py"
    - "fix_ma_and_benchmark.py"
    - "realtime_data_updater.py"
    - "transaction.py"
    - "verify_html_integrity.py"
  
  # 必需的数据文件
  required_data_files:
    - "etf_full_kline_data.json"
    - "etf_realtime_data.json"
    - "fund_flow_data.json"
  
  # ETF代码（用于完整性检查）
  etf_codes:
    - "512400"
    - "513120"
    - "512070"
    - "515880"
    - "159566"
    - "159698"

# ============================================================
# 8. 日志配置
# ============================================================
logging:
  # 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  level: "INFO"
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # 日志目录
  log_dir: "logs"
  # 单个日志文件大小限制（字节）
  max_file_size: 10485760  # 10MB
  # 保留备份日志数量
  backup_count: 5
  # 日志文件名前缀
  filename_prefix: "etf_report"

# ============================================================
# 9. 更新流程控制
# ============================================================
update_workflow:
  # 步骤1：K线数据更新
  step_kline_update:
    enabled: true
    description: "获取K线数据并计算均线"
  
  # 步骤2：实时行情更新
  step_realtime_update:
    enabled: true
    description: "获取实时行情数据（ETF涨跌幅+成分股涨跌幅）"
    fail_continue: true  # 失败是否继续下一步
  
  # 步骤3：HTML数据更新
  step_html_data_update:
    enabled: true
    description: "更新HTML中的K线数据和实时行情数据"
  
  # 步骤4：日期信息更新
  step_html_date_update:
    enabled: true
    description: "更新报告日期、数据截止、生成时间"
  
  # 步骤5：HTML完整性验证
  step_html_integrity_check:
    enabled: true
    description: "验证HTML结构和数据完整性"
    fail_rollback: true  # 失败是否回滚
  
  # 步骤6：输出文件验证
  step_output_verification:
    enabled: true
    description: "验证所有输出文件是否存在"

# ============================================================
# 10. 事务管理配置 (REQ-103)
# ============================================================
transaction:
  # 备份位置（相对于skill根目录）
  backup_dir: ".backup"
  # 备份保留数量
  max_backups: 5
  # 备份时间戳格式
  timestamp_format: "%Y%m%d_%H%M%S"

# ============================================================
# 11. 用户提示与文档
# ============================================================
messages:
  update_timing: "建议在交易日收盘后(15:00之后)执行更新"
  data_source: "K线/实时行情：新浪财经API"
  ma_warmup_note: "MA均线从第一天即有完整数据(已预热)"
  realtime_data_note: "ETF涨跌幅和成分股涨跌幅为实时数据"
